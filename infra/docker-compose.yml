# host-agent — one container, s6-supervised, bundles the Dell fan
# controller + Prometheus exporters (node, cadvisor, ipmi, smartctl,
# nvidia-gpu). Each sub-process probes its hardware on start and
# `sleep infinity` if absent, so the same image drops onto any Linux
# Docker host (classe, docker-2, Unraid, future Dell boxes) unchanged.
#
# After a host has this compose in place, all future updates flow via
# watchtower bumping the image tag — no further per-host action.
#
# GPU hosts: set HOST_AGENT_RUNTIME=nvidia in the environment (e.g. via
# infra/.env) and the NVIDIA Container Runtime will inject nvidia-smi
# at start, enabling the nvidia-gpu-exporter sub-service. Default is
# runc — harmless on hosts without nvidia-container-toolkit.
services:
  host-agent:
    image: registry.docker.pq.io/host-agent:latest
    container_name: host-agent
    restart: unless-stopped
    privileged: true
    network_mode: host
    pid: host
    runtime: ${HOST_AGENT_RUNTIME:-runc}
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    volumes:
      - /:/host:ro,rslave
      - /sys:/sys:ro
      - /dev:/dev
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/lib/dell-fans:/var/lib/dell-fans
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
