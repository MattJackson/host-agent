# host-agent — one container, s6-supervised, bundles the Dell fan
# controller + Prometheus exporters (node, cadvisor, ipmi, smartctl,
# nvidia-gpu). Each sub-process probes its hardware on start and
# `sleep infinity` if absent, so the same image drops onto any Linux
# Docker host (classe, docker-2, Unraid, future Dell boxes) unchanged.
#
# After a host has this compose in place, all future updates flow via
# watchtower bumping the image tag — no further per-host action.
#
# GPU hosts: set HOST_AGENT_RUNTIME=nvidia in the environment (e.g. via
# infra/.env) and the NVIDIA Container Runtime will inject nvidia-smi
# at start, enabling the nvidia-gpu-exporter sub-service. Default is
# runc — harmless on hosts without nvidia-container-toolkit.
services:
  host-agent:
    image: registry.docker.pq.io/host-agent:latest
    container_name: host-agent
    restart: unless-stopped
    privileged: true
    network_mode: host
    # pid: host omitted — s6-overlay requires PID 1, and the host
    # metrics we display (CPU, mem, disk, net, load, textfile) don't
    # need host PID visibility. Sub-services that ask for it (cadvisor)
    # have their own access via the docker socket.
    runtime: ${HOST_AGENT_RUNTIME:-runc}
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    # Mount set:
    #   /:/host:ro,rslave        — node-exporter rootfs/procfs view
    #   /sys:/sys:ro             — cadvisor reads /sys/fs/cgroup directly; even
    #                              with --privileged the container still has its
    #                              own cgroup namespace, so we hand it the host's
    #                              /sys. Without this, cadvisor sees no containers.
    #   /run:/run:ro             — cadvisor opens /run/docker.sock AND
    #                              /run/containerd/containerd.sock at hardcoded
    #                              paths; --docker=unix://... only redirects the
    #                              docker socket, not containerd. /host/run/...
    #                              doesn't help because cadvisor doesn't look there.
    #   /var/lib/docker:ro       — cadvisor reads container metadata from here.
    #   /dev:/dev                — ipmitool + smartctl hardcode /dev/* paths and
    #                              Docker doesn't auto-import host devices.
    #   /var/lib/dell-fans       — fan EWMA baseline + vmagent WAL persistence.
    volumes:
      - /:/host:ro,rslave
      - /sys:/sys:ro
      # /run must be rw — NVIDIA Container Runtime's ldcache hook writes
      # a scratch dir at /run/nvidia-ctk-hook during container init.
      - /run:/run
      - /var/lib/docker:/var/lib/docker:ro
      - /dev:/dev
      - /var/lib/dell-fans:/var/lib/dell-fans
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
